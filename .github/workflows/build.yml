name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  schedule:
    # check for new BeamMP-Server releases weekly on Monday at 02:00 UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      bmps_ver:
        description: 'BeamMP-Server version (e.g. v3.9.2). Leave empty to use the latest release.'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine BeamMP-Server version
        id: bmps_ver
        run: |
          if [ -n "${{ github.event.inputs.bmps_ver }}" ]; then
            echo "version=${{ github.event.inputs.bmps_ver }}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(curl -sf https://api.github.com/repos/BeamMP/BeamMP-Server/releases/latest | jq -r '.tag_name // empty')
            if [ -z "${VERSION}" ]; then
              echo "ERROR: Failed to determine latest BeamMP-Server version" >&2
              exit 1
            fi
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            joshuagessner/beammp-server
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.bmps_ver.outputs.version }},enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            BMPS_VER=${{ steps.bmps_ver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
